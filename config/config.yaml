# Video Summarization Pipeline Configuration
# 视频摘要流程配置文件

# Dataset paths - modify these to your actual dataset locations
# 数据集路径 - 请修改为您的实际数据集位置
dataset_paths:
  - "./data/SumMe"
  - "./data/TVSum"

# Pipeline parameters
# 流程参数
frame_context_window: 3    # Frame context window length / 帧上下文窗口长度
frame_interval: 15         # Frame sampling interval / 帧采样间隔
output_dir: "./results"    # Output directory / 输出目录

# TensorBoard logging configuration
# TensorBoard日志配置
logging:
  enabled: true              # Enable TensorBoard logging / 启用TensorBoard日志
  log_dir: "./tensorboard_logs"  # TensorBoard log directory / TensorBoard日志目录
  experiment_name: null      # Experiment name (auto-generated if null) / 实验名称（为null时自动生成）
  comment: ""                # Additional comment for experiment / 实验的额外注释

# Model parameters
# 模型参数
model_name: "Qwen/Qwen2.5-VL-7B-Instruct"
device_map: "auto"         # Device mapping: "auto", "cuda:0", "cpu", etc.

# Importance query prompt
# 重要性查询提示词
importance_prompt: |
  Please evaluate the importance of this frame for video summarization.
  Consider the following factors:
  1. Key moments of scene changes
  2. Important actions or events
  3. Appearance of key people or objects
  4. Plot turning points

  Please provide an importance score between 0 and 1, where:
  - 0 means completely unimportant
  - 0.5 means moderately important
  - 1 means extremely important

  Only respond with a numerical score, no explanation needed.
